<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Modelo</title>
    </head>
    <body>
        <div id="root"></div>

        <!-- Link para o tailwind -->
        <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
        <!-- Sempre necessário ter esses links para usar o react. (Caso nao use um package.json por exemplo...) -->
        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

        <script type="text/babel">
            const InputFocus = () => {
                const ref = React.useRef(null);

                const handleClick = () => {
                    ref?.current?.focus();
                };

                return (
                    <div className="space-x-2">
                        <input
                            ref={ref}
                            className="p-2 border"
                            placeholder="Clique no botao para focar"
                        />
                        <button onClick={handleClick} className="p-2 border">
                            Focar no Input
                        </button>
                    </div>
                );
            };

            const ScrollTracker = () => {
                const containerRef = React.useRef(null);
                const [scrollInfo, setScrollInfo] = React.useState({
                    scrollTop: 0,
                    scrollHeight: 0,
                    clientHeight: 0,
                });
                const [scrollPercentage, setScrollPercentage] =
                    React.useState(0);

                const handleContainerScroll = () => {
                    if (!containerRef.current) {
                        return;
                    }

                    const { scrollTop, scrollHeight, clientHeight } =
                        containerRef.current;

                    setScrollInfo({
                        scrollTop,
                        scrollHeight,
                        clientHeight,
                    });

                    const maxScroll = scrollHeight - clientHeight;
                    const percentage = Math.round(
                        (scrollTop / maxScroll) * 100,
                    );

                    setScrollPercentage(percentage);
                };

                return (
                    <div className="space-y-4">
                        <div
                            ref={containerRef}
                            onScroll={handleContainerScroll}
                            className={`
                            border border-solid border-blue-500 p-4
                                h-60 overflow-y-auto
                            `}
                        >
                            <div className="space-y-4">
                                {Array.from({ length: 20 }).map((_, index) => (
                                    <p
                                        key={index}
                                        className="p-2 bg-gray-100 rounded"
                                    >
                                        Item do coneudo {index + 1}
                                    </p>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-2">
                            <ul className="space-y-2 list-disc pl-5">
                                <li>Progresso do scroll: {scrollPercentage}</li>
                                <li>
                                    Onde esta o scroll (scrollTop):{" "}
                                    {scrollInfo.scrollTop}
                                </li>
                                <li>
                                    Tamanho do container (clientHeight):{" "}
                                    {scrollInfo.clientHeight}
                                </li>
                            </ul>
                        </div>
                    </div>
                );
            };

            const App = () => {
                return (
                    <main className="p-3 space-y-6">
                        <InputFocus />
                        <hr />
                        <ScrollTracker />
                    </main>
                );
            };

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>
