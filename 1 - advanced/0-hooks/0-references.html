<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelo</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Link para o tailwind -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Sempre necessário ter esses links para usar o react. (Caso nao use um package.json por exemplo...) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const InputFocus = () => {
        const ref = React.useRef(null);

        const handleClick = () => {
            ref?.current?.focus();
        };

        return (
          <div className="space-x-2">
            <input
              ref={ref}
              className="p-2 border"
              placeholder="Clique no botao para focar"
            />
            <button onClick={handleClick} className="p-2 border">
              Focar no Input
            </button>
          </div>
        );
      };

      const App = () => {
        return (
          <main className="p-3 spac-y-6">
            <InputFocus />
          </main>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
