<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Modelo</title>
    </head>
    <body>
        <div id="root"></div>

        <!-- Sempre necessário ter esses links para usar o react. 
        (Caso nao use um package.json por exemplo...) -->
        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

        <script type="text/babel">
            const App = () => {
                const [is12hours, setIs12hours] = React.useState(false);
                const [time, setTime] = React.useState("");

                const updateTime = React.useCallback(() => {
                    const now = new Date(Date.now());
                    const formattedTime = now.toLocaleTimeString("pt-BR", {
                        hour: "2-digit",
                        minute: "2-digit",
                        second: "2-digit",
                        hour12: is12hours,
                    });

                    setTime(formattedTime);
                }, [is12hours]);

                React.useEffect(() => {
                    updateTime();

                    const timer = setInterval(() => {
                        updateTime();
                    }, 1000);

                    return () => clearInterval(timer);
                }, [updateTime]);

                return (
                    <main>
                        <div>{time}</div>
                        <button onClick={() => setIs12hours(!is12hours)}>
                            Alterar para o formato {is12hours ? "24h" : "12h"}
                        </button>
                    </main>
                );
            };

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />
            );
        </script>
    </body>
</html>
