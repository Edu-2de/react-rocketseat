<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">

    <title>Rocketseat - React.js - Fundamentos</title>

    <style type="text/tailwindcss">

      @theme {
       --text: #484a4f;
       --text-secondary: #828282;

       --purple: #ecccff;
       --green: #a6d997;
       --blue: #72c8cc;
       --red: #ff7576;
       --darkpurple: #8e4b6e;

       --background: #f9f9f9;

       --font-sans: 'Rubik', sans-serif;
      }

    </style>
  </head>

  <body class=" min-h-screen bg-white text-(--text) font-(--font-sans)">
    <div id="root"></div>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

      const colorVariants = {
        default: 'text-(--text)',
        muted: 'text-(--text-secondary)',
        purple: 'text-(--purple)',
        green: 'text-(--green)',
        blue: 'text-(--blue)',
        red: 'text-(--red)',
        dark: 'text-(--darkpurple)',
      }

      const textSizes = {
        sm: 'text-sm',
        md: 'text-base',
        lg: 'text-xl',
        xl: 'text-2xl',
        '2xl': 'text-3xl',
      }

      const bgVariants = {
        default: 'bg-(--background)',
        white: 'bg-white',
        purple: 'bg-(--purple)',
        green: 'bg-(--green)',
      }

      const Card = ({
        variant = 'default',
        className = '',
        children,
        ...props
      }) => {
        return (
          <div
            className={`
              ${bgVariants[variant]}
              ${className}
            `}
            {...props}
          >
            {children}
          </div>
        )
      }


      const Text = ({
        as = 'span',
        variant = 'default',
        size = 'md',
        children,
        className,
        ...props
      }) => {
        return(
          React.createElement(
            as,
            {
              className: `${colorVariants[variant]} ${textSizes[size]} ${className || ''}`,
              ...props,
            },
            children
          )
        )
      }

      const SideBar = ({
        children
      }) => {
        return(
          <Card className="w-[20%] h-screen flex flex-col p-6 border-r border-gray-200">
            <Text size='xl' className='font-bold mb-10'>Payd</Text>
            {children}
          </Card>
        )
      }

      const NavGroup = ({ title, children }) => {
        return (
          <div className="flex flex-col mb-6">
            {/* Cabeçalho do Grupo */}
            <div className="flex items-center justify-between mb-4 cursor-pointer">
              <Text variant="muted" size="sm" className="font-bold uppercase tracking-wider">
                {title}
              </Text>
              <Text variant="muted" size="sm">▲</Text>
            </div>

            {/* Lista de Itens */}
            <div className="flex flex-col gap-1">
              {children}
            </div>
          </div>
        )
      }

      const NavItem = ({ children, icon, active = false }) => {
        return (
          <div className={`
            flex items-center gap-3 p-2 rounded-lg cursor-pointer transition-colors
            ${active ? 'bg-white shadow-(--shadow) border-l-4 border-(--darkpurple)' : 'hover:bg-gray-100'}
          `}>
            <div className="opacity-50">{icon}</div>
            <Text variant={active ? 'default' : 'muted'} size="md">
              {children}
            </Text>
          </div>
        )
      }


      const App = () => {
          return(
            <main className={`

            `}>
            <SideBar>
              <NavGroup title="Payments">
                <NavItem icon="🔄">Transactions</NavItem>
                <NavItem icon="👥">Customers</NavItem>
                <NavItem icon="💳">Payouts</NavItem>
              </NavGroup>

              <hr className="my-6 border-gray-100" />

              <NavGroup title="Commerce">
                <NavItem icon="🔗">Referrals</NavItem>
                <NavItem icon="⚙️">Settings</NavItem>
              </NavGroup>
            </SideBar>
            </main>
          )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(
        <App/>
      )
    </script>
  </body>

</html>
