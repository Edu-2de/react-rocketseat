<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelo</title>
    <style type="text/tailwindcss">

      @theme {
       --text: #2b2b2b;

       --primary: #462878;
       --background: #2D2A37;

       --bg-hover: #cccccc;

       --gradient: 180deg,
         rgba(0, 0, 0, 0.05) 0%,
         rgba(255, 255, 255, 0.05) 100%;

       --gradient-hover: 180deg,
         rgba(0, 0, 0, 0.1) 0%,
         rgba(255, 255, 255, 0.1) 100%;

       --shadow: 0px 11px 7px 0px rgba(0, 0, 0, 0.01),
         0px 7px 7px 0px rgba(0, 0, 0, 0.04),
         0px 4px 6px 0px rgba(0, 0, 0, 0.10),
         0px 2px 4px 0px rgba(0, 0, 0, 0.26),
         0px 0px 2px 0px rgba(0, 0, 0, 0.29),
         0px 2px 3px 0px rgba(255, 255, 255, 0.06) inset;

       --font-sans: 'Rubik', sans-serif;
      }

    </style>
  </head>
  <body class="text-(--text) font-(--font-sans)">
    <div id="root"></div>

    <!-- Link para o tailwind -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Sempre necessário ter esses links para usar o react. (Caso nao use um package.json por exemplo...) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

      const textVariants = {
        default: 'text-xl',
        muted: 'text-xl text-(--text-secondary)',
        heading: 'text-2xl',
        blast: 'text-3xl',
      }

      const Text = ({
        as = 'span',
        variant = 'default',
        className,
        children,
        ...props
      }) => {
        return(
          React.createElement(
            as,
            {
              className : `${textVariants[variant]}
              ${className ? className : ''}`,
              ...props,
            },
            children
          )
        )
      }

      const cardVariant = {
        default: 'bg-[#ffffff]'
      }

      const Card = ({
        variant = 'default',
        children,
        icon,
        className,
        ...props
      }) => {
        return(
          <div className={`
            w-120 h-20
            border-2 border-gray-300 rounded-md
            flex justify-center items-center py-2
            gap-2
            cursor-pointer
            hover:bg-(--bg-hover)

            ${cardVariant[variant]}
            ${className ? className : ''},
          `}
          {...props}
          >
            <Text>{icon}</Text>

            <Text>{children}</Text>

          </div>
        )
      }

      const searchItens = {
        [
          icon = '@',
          name = 'placa-de-video'
        ],
      }

      const SearchBar = ({
        children
      }) => {
        return(
          <div>

          </div>
        )
      }


      const App = () => {
        return(
          <main className="min-h-screen w-full flex items-center justify-center gap-2">
            <Card></Card>
          </main>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
    </script>
  </body>
</html>
