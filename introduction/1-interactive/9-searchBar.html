<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelo</title>
    <style type="text/tailwindcss">

      @theme {
       --text: #2b2b2b;

       --primary: #462878;
       --background: #2D2A37;

       --bg-hover: #cccccc;

       --gradient: 180deg,
         rgba(0, 0, 0, 0.05) 0%,
         rgba(255, 255, 255, 0.05) 100%;

       --gradient-hover: 180deg,
         rgba(0, 0, 0, 0.1) 0%,
         rgba(255, 255, 255, 0.1) 100%;

       --shadow: 0px 11px 7px 0px rgba(0, 0, 0, 0.01),
         0px 7px 7px 0px rgba(0, 0, 0, 0.04),
         0px 4px 6px 0px rgba(0, 0, 0, 0.10),
         0px 2px 4px 0px rgba(0, 0, 0, 0.26),
         0px 0px 2px 0px rgba(0, 0, 0, 0.29),
         0px 2px 3px 0px rgba(255, 255, 255, 0.06) inset;

       --font-sans: 'Rubik', sans-serif;
      }

    </style>
  </head>
  <body class="text-(--text) font-(--font-sans)">
    <div id="root"></div>

    <!-- Link para o tailwind -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Sempre necessário ter esses links para usar o react. (Caso nao use um package.json por exemplo...) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

      const textVariants = {
        default: 'text-xl',
        muted: 'text-xl text-(--text-secondary)',
        heading: 'text-2xl',
        blast: 'text-3xl',
      }

      const Text = ({
        as = 'span',
        variant = 'default',
        className,
        children,
        ...props
      }) => {
        return(
          React.createElement(
            as,
            {
              className : `${textVariants[variant]}
              ${className ? className : ''}`,
              ...props,
            },
            children
          )
        )
      }

      const cardVariant = {
        default: 'bg-[#ffffff]'
      }

      const Card = ({
        variant = 'default',
        children,
        icon,
        className,
        ...props
      }) => {
        return(
          <div className={`
            w-120 h-20 min-h-20
            border-2 border-gray-300 rounded-md
            flex justify-center items-center py-2
            gap-2
            cursor-pointer
            hover:bg-(--bg-hover)

            ${cardVariant[variant]}
            ${className ? className : ''}
          `}
          {...props}
          >
            <Text>{icon}</Text>

            <Text>{children}</Text>

          </div>
        )
      }

      const searchItens = [

          {
            icon :'@',
            name : 'placa-de-video'
          },
          {
            icon :'#',
            name : 'processador'
          },
          {
            icon :'$',
            name : 'mouse'
          },
          {
            icon :'%',
            name : 'teclado'
          },
          {
            icon :'^',
            name : 'monitor'
          },


      ]

      const SearchBar = ({
        children
      }) => {
        const [search, setSearch] = React.useState('')


        return(
          <div className={`
            w-full min-h-min
            flex items-center justify-center flex-col
            gap-5
          `}
          >
            <div className={`
              w-120 h-16
              rounded-full border-2 border-gray-700
              flex items-center justify-center
            `}
            >
              <input className={`
                flex text-center
                outline-0 focus:text-left
              `}
              type="text"
              value={search}
              onChange={e => setSearch(e.target.value ) }
              placeholder='Digite Algo...'/>
            </div>

            <div className={`
              max-h-60 w-120
              rounded-md
              flex gap-2 overflow-y-auto
              flex-col overflow-x-hidden
            `}>
              {search === '' ? (
                <p className="text-gray-400 text-center mt-4">
                  Digite o nome de uma peça para buscar...
                </p>
              ) : (
                searchItens
                  .filter((peca) =>
                    peca.name.toLowerCase().includes(search.toLowerCase())
                  )
                  .map((peca) => (
                    <Card key={peca.name} icon={peca.icon}>
                      {peca.name}
                    </Card>
                  ))
              )}
            </div>
          </div>


        )
      }


      const App = () => {
        return(
          <main className="min-h-screen w-full flex items-center justify-center gap-2">
            <SearchBar/>
          </main>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
    </script>
  </body>
</html>
