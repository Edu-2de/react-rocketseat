<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelo</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Sempre necessário ter esses links para usar o react. (Caso nao use um package.json por exemplo...) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

      const Alert1 = () => {

        const handleAlertClick = (event) => {
          console.log(event)
          alert('Uma mensagem de alerta!')
        }

        return(
          <button type='button' onClick={handleAlertClick}>
            Mostrar Alerta
          </button>
        )
      }

      const Alert2 = () => {

        const handleAlertClick = (msg) => {
          alert(msg)
        }

        return(
          <button
            onClick={() => handleAlertClick('Uma mensagem de Alerta!')}
            type='button'
          >
            Mostrar Alerta c/ Parametro
          </button>
        )
      }

      const Alert3 = () => {

        const handleAlertClick = (event) => {
          alert(event.target.previousSibling.value);
        }


        return(
          <div>
            <input
              type="text"
              placeholder='Digite Algo...'
            />
            <button
              onClick={handleAlertClick}
            >
              Mostrar Alerta do campo de texto!
            </button>
          </div>
        )
      }

      const App = () => {
        return(
          <main>
            <Alert1/>
            <Alert2/>
            <Alert3/>
          </main>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
    </script>
  </body>
</html>
